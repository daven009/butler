<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #F5F3EF; font-family: 'Inter', -apple-system, system-ui, sans-serif; color:#222; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }
  @keyframes slidein { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  .spinner { width:14px; height:14px; border:2px solid #fff5; border-top-color:#fff; border-radius:50%; animation: spin .8s linear infinite; display:inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* board layout */
  .board {
    padding: 48px 40px 80px;
    min-height: 100vh;
  }
  .board-head { max-width: 1400px; margin: 0 auto 36px; }
  .board-head .eyebrow { font-size:11px; font-weight:700; letter-spacing:0.8px; color:#FF385C; text-transform:uppercase; }
  .board-head h1 { font-family:'Playfair Display', Georgia, serif; font-size:44px; font-weight:600; letter-spacing:-0.8px; margin: 8px 0 6px; line-height:1.05; }
  .board-head p { font-size:15px; color:#717171; margin:0; max-width: 620px; line-height:1.5; }

  .phone-grid {
    max-width: 1400px; margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px 36px;
    justify-items: center;
  }
  .phone-cell { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .phone-cell .cap-eyebrow { font-size:10px; font-weight:700; letter-spacing:0.9px; color:#FF385C; text-transform:uppercase; }
  .phone-cell .cap-title { font-family:'Playfair Display', Georgia, serif; font-size:19px; font-weight:600; letter-spacing:-0.3px; text-align:center; }
  .phone-cell .cap-sub { font-size:12.5px; color:#717171; text-align:center; max-width:280px; line-height:1.45; }
  .phone-cell.active .cap-eyebrow { color:#222; }
  .phone-cell.active .cap-title::after {
    content: ' · live'; color:#FF385C; font-family:Inter, sans-serif; font-size:11px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
  }

  @media (max-width: 1100px) { .phone-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 720px) { .phone-grid { grid-template-columns: 1fr; gap:40px; } .board { padding: 32px 16px 60px; } .board-head h1 { font-size:32px; } }
</style>
</head>

function IOSStatusBar({ dark = false, time = '9:41' }) {

      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',

    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{ fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590, fontSize: 17, lineHeight: '22px', color: c }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px' }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{ padding: '0 16px', fontFamily: '-apple-system, system-ui', fontSize: 34, fontWeight: 700, lineHeight: '41px', color: text, letterSpacing: 0.4 }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{ display: 'flex', alignItems: 'center', minHeight: 52, padding: '0 16px', position: 'relative', fontFamily: '-apple-system, system-ui', fontSize: 17, letterSpacing: -0.43 }}>
      {icon && <div style={{ width: 30, height: 30, borderRadius: 7, background: icon, marginRight: 12, flexShrink: 0 }} />}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && <div style={{ position: 'absolute', bottom: 0, right: 0, left: icon ? 58 : 16, height: 0.5, background: sep }} />}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && <div style={{ fontFamily: '-apple-system, system-ui', fontSize: 13, color: hc, textTransform: 'uppercase', padding: '8px 36px 6px', letterSpacing: -0.08 }}>{header}</div>}
      <div style={{ background: bg, borderRadius: 26, margin: '0 16px', overflow: 'hidden' }}>{children}</div>
    </div>
  );
}

function IOSDevice({ children, width = 402, height = 874, dark = false, title, keyboard = false }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden', position: 'relative',
      background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif', WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50 }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60, height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, pointerEvents: 'none' }}>
        <div style={{ width: 139, height: 5, borderRadius: 100, background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)' }} />
      </div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };
  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5, flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg, boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui', fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );
  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );
  return (
    <div style={{ position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden', padding: '11px 0 2px', display: 'flex', flexDirection: 'column', alignItems: 'center', boxShadow: dark ? '0 -2px 20px rgba(0,0,0,0.09)' : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)' }}>
      <div style={{ position: 'absolute', inset: 0, borderRadius: 27, backdropFilter: 'blur(12px) saturate(180%)', WebkitBackdropFilter: 'blur(12px) saturate(180%)', background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)' }} />
      <div style={{ position: 'absolute', inset: 0, borderRadius: 27, boxShadow: dark ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)' : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)', border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)', pointerEvents: 'none' }} />
      <div style={{ display: 'flex', gap: 20, alignItems: 'center', padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box', position: 'relative' }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{ flex: 1, textAlign: 'center', fontFamily: '-apple-system, system-ui', fontSize: 17, color: sugg, letterSpacing: -0.43, lineHeight: '22px' }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 13, padding: '0 6.5px', width: '100%', boxSizing: 'border-box', position: 'relative' }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

function Avatar({ label, color, size=40 }) {
  return <div style={{
    width:size, height:size, borderRadius:'50%', background:color||'#E4E4E4',
    color:'#fff', display:'grid', placeItems:'center',

function Chip({ children, tone='default' }) {
  const styles = {
    default: { bg:'#F0F0F0', fg:AB.ink },
    green:   { bg:'#E9F5F1', fg:'#006A5B' },
    red:     { bg:'#FEE7EC', fg:'#C13584' },
    amber:   { bg:'#FFF4DB', fg:'#8B5A00' },
  };
  const s = styles[tone];

function LiveTicker({ tick }) {
  const events = [
    { agent:'Daniel Koh',  text:'confirmed Sun 7:45pm', tone:'green' },
    { agent:'Sarah Lim',   text:'proposed Sun 2pm · flagged conflict', tone:'red' },
    { agent:'James Wong',  text:'owner approved the profile',   tone:'green' },

          <ToggleRow t="Transcribe voice notes" s="Whisper · confirm understanding" on={voice} onChange={setVoice}/>
          <ToggleRow t="Auto-handoff on pricing" s="Escalate to you for offer questions" on={true} onChange={()=>{}}/>
          <ToggleRow t="Disclose AI identity" s="Required by Meta · always on" on={true} onChange={()=>{}} locked last/>
        </div>
      </div>

      <BottomTabs active="settings" nav={nav}/>
    </div>
  );
}

function ScreenOnboarding({ nav }) {
  const [step, setStep] = useState(0);
  const steps = [
    { eyebrow:'WELCOME', title:'Let the AI handle the juggling.', body:'butler.ai coordinates every opposing agent on WhatsApp so you can focus on your clients.', cta:'Get started' },
    { eyebrow:'CONNECT · STEP 1 / 2', title:'Link your WhatsApp Business.', body:"Messages will always send from your own number. The AI introduces itself in the first line — never pretends to be you.", cta:'Connect WhatsApp' },
    { eyebrow:"YOU'RE SET", title:'Welcome aboard, David.', body:'Start your first tour — paste a PropertyGuru search or describe what your client wants.', cta:'Open dashboard' },
  ];
  const s = steps[step];
  return (
    <div style={{
      minHeight:'100%',
      background: step===0 ? 'linear-gradient(180deg, #FFE8EC 0%, #fff 60%)' : step===1 ? 'linear-gradient(180deg, #E4F5EF 0%, #fff 60%)' : 'linear-gradient(180deg, #FFF3DE 0%, #fff 60%)',
      padding:'80px 28px 40px', display:'flex', flexDirection:'column',
    }}>
      <div style={{ marginBottom:20, display:'flex', gap:6 }}>
        {steps.map((_,i)=>(
          <div key={i} style={{ flex:1, height:3, borderRadius:2, background: i<=step ? AB.ink : '#0002' }}/>
        ))}
      </div>

      <div style={{ width:'100%', aspectRatio:'1.2/1', borderRadius:24, background:AB.white, boxShadow:'0 4px 24px rgba(0,0,0,0.07)', border:`1px solid ${AB.border}`, padding:20, display:'grid', placeItems:'center', marginBottom:20 }}>
        {step===0 && (
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:64, marginBottom:6 }}>🗝️</div>
            <div style={{ fontFamily:'"Playfair Display", Georgia, serif', fontSize:22, fontWeight:600, color:AB.rausch, letterSpacing:-0.3 }}>butler.ai</div>
            <div style={{ fontSize:12, color:AB.gray, marginTop:4 }}>Singapore property · agent assistant</div>
          </div>
        )}
        {step===1 && (
          <div style={{ display:'flex', alignItems:'center', gap:16 }}>
            <div style={{ width:60, height:60, borderRadius:18, background:AB.ink, color:'#fff', display:'grid', placeItems:'center', fontFamily:'"Playfair Display", Georgia, serif', fontSize:30 }}>b</div>
            <div style={{ width:28, height:2, background:'#0003' }}/>
            <div style={{ width:60, height:60, borderRadius:18, background:'#25D366', color:'#fff', display:'grid', placeItems:'center' }}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14c-.3-.1-1.7-.8-2-.9-.3-.1-.4-.1-.6.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-1.2-.6-2.4-1.5-3.4-3-.3-.5 0-.5.3-1 .2-.2.4-.5.5-.8.1-.3 0-.5 0-.6-.1-.2-.6-1.5-.8-2-.2-.5-.4-.5-.6-.5H7.5c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.2 3 .2.2 2 3 4.8 4.2 1.7.7 2.3.8 3.2.6.5-.1 1.7-.7 2-1.4.2-.6.2-1.2.2-1.3-.2-.2-.3-.3-.6-.4zM12 2C6.5 2 2 6.5 2 12c0 1.9.5 3.7 1.5 5.3L2 22l4.8-1.3c1.5.9 3.4 1.3 5.2 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
            </div>
          </div>
        )}
        {step===2 && (
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:54, marginBottom:10 }}>✨</div>
            <div style={{ fontSize:13, color:AB.gray }}>1 tour in progress · 0 decisions waiting</div>
          </div>
        )}
      </div>

      <div style={{ fontSize:11, fontWeight:700, color:AB.rausch, letterSpacing:0.8 }}>{s.eyebrow}</div>
      <div style={{ fontFamily:'"Playfair Display", Georgia, serif', fontSize:28, fontWeight:600, letterSpacing:-0.4, lineHeight:1.2, marginTop:6 }}>{s.title}</div>
      <div style={{ fontSize:14, color:AB.gray, marginTop:8, lineHeight:1.5 }}>{s.body}</div>

      <div style={{ marginTop:'auto', display:'flex', flexDirection:'column', gap:10 }}>
        <button onClick={()=> step===steps.length-1 ? nav('home') : setStep(step+1)} style={{
          width:'100%', padding:'15px', border:0, borderRadius:12,
          background:AB.ink, color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer',
        }}>{s.cta}</button>
        {step>0 && step<steps.length-1 && (
          <button onClick={()=>nav('home')} style={{ padding:'8px', border:0, background:'transparent', color:AB.gray, fontSize:13, cursor:'pointer' }}>Skip for now</button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// Main — board layout with 9 phone frames
// ============================================================

function PhoneFrame({ children, scale=1 }) {
  return (
    <div style={{ transform:`scale(${scale})`, transformOrigin:'top center' }}>
      <IOSDevice width={390} height={844}>
        <div style={{ height:'100%', overflow:'auto', position:'relative' }}>
          {children}
        </div>
      </IOSDevice>
    </div>
  );
}

function ActivePhone() {
  const [screen, setScreen] = useState(() => {
    try { return localStorage.getItem('ba-screen') || 'home'; } catch(e){ return 'home'; }
  });
  useEffect(()=>{ try { localStorage.setItem('ba-screen', screen); } catch(e){} }, [screen]);

  const nav = (s)=> setScreen(s);
  let Screen;
  switch(screen) {
    case 'home':       Screen = <ScreenHome nav={nav}/>; break;
    case 'tour':       Screen = <ScreenTour nav={nav}/>; break;
    case 'chat':       Screen = <ScreenChat nav={nav}/>; break;
    case 'search':     Screen = <ScreenSearch nav={nav}/>; break;
    case 'decision':   Screen = <ScreenDecision nav={nav}/>; break;
    case 'itinerary':  Screen = <ScreenItinerary nav={nav}/>; break;
    case 'buyer':      Screen = <ScreenBuyer nav={nav}/>; break;
    case 'notif':      Screen = <ScreenNotif nav={nav}/>; break;
    case 'settings':   Screen = <ScreenSettings nav={nav}/>; break;
    case 'onboarding': Screen = <ScreenOnboarding nav={nav}/>; break;
    default:           Screen = <ScreenHome nav={nav}/>;
  }
  return <PhoneFrame>{Screen}</PhoneFrame>;
}

function StaticPhone({ screen }) {
  const nop = ()=>{};
  let S;
  switch(screen) {
    case 'onboarding': S = <ScreenOnboarding nav={nop}/>; break;
    case 'search':     S = <ScreenSearch nav={nop}/>; break;
    case 'chat':       S = <ScreenChat nav={nop}/>; break;
    case 'decision':   S = <ScreenDecision nav={nop}/>; break;
    case 'itinerary':  S = <ScreenItinerary nav={nop}/>; break;
    case 'buyer':      S = <ScreenBuyer nav={nop}/>; break;
    case 'notif':      S = <ScreenNotif nav={nop}/>; break;
    case 'settings':   S = <ScreenSettings nav={nop}/>; break;
    default:           S = <ScreenHome nav={nop}/>;
  }
  return <PhoneFrame>{S}</PhoneFrame>;
}

function Board() {
  const cells = [
    { screen:'onboarding', cellKey:'ob',   eyebrow:'01 · OPEN',          title:'Onboarding',        sub:'Sign up, link WhatsApp, meet the AI assistant.' },
    { screen:'home',       cellKey:'home', eyebrow:'02 · DAILY DRIVER',  title:'Agent home',        sub:'Active tours at a glance — progress, alerts, what needs you today.' },
    { screen:'search',     cellKey:'srch', eyebrow:'03 · SEARCH',        title:'AI search',         sub:'PropertyGuru link or plain English — semantic filter finds the fit.' },
    { cellKey:'tour', active:true, eyebrow:'TAP AROUND',                title:'Tour Detail',       sub:'The hero — fully interactive. Try the AI chat handoff, decision card, itinerary preview.' },
    { screen:'chat',       cellKey:'chat', eyebrow:'05 · CHAT TAKEOVER', title:'AI thread',         sub:'Read the whole conversation, tap to take over, AI pauses immediately.' },
    { screen:'decision',   cellKey:'dec',  eyebrow:'06 · EXCEPTION',     title:'Decision card',     sub:"When AI can't schedule — three options, one tap." },
    { screen:'itinerary',  cellKey:'itin', eyebrow:'07 · FINAL',         title:'Itinerary',         sub:'Ready to share · map · transits · clusters · 30-min stops.' },
    { screen:'buyer',      cellKey:'byr',  eyebrow:'08 · BUYER VIEW',    title:'The Chens see this',sub:'No login. Opens from the WhatsApp link you send.' },
    { screen:'settings',   cellKey:'set',  eyebrow:'09 · CONFIG',        title:'AI tone & rules',   sub:'Change the voice and the message preview re-renders live.' },
  ];

  return (
    <div className="board">
      <div className="board-head">
        <div className="eyebrow">butler.ai · agent app · iOS</div>
        <h1>A mobile coordination room for<br/>Singapore property agents.</h1>
        <p>Nine screens from one agent's working day. The <strong>Tour Detail</strong> phone in the middle is fully interactive — tap through to chat, decisions, and the final itinerary. Others show the key states you'll see en route.</p>
      </div>

      <div className="phone-grid">
        {cells.map(c => (
          <div key={c.cellKey} className={`phone-cell ${c.active?'active':''}`}>
            {c.active ? <ActivePhone/> : <StaticPhone screen={c.screen}/>}
            <div className="cap-eyebrow">{c.eyebrow}</div>
            <div className="cap-title">{c.title}</div>
            <div className="cap-sub">{c.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Board/>);
</script>
